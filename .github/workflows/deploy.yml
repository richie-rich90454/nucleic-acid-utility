name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build
        env:
          BASE: /

      - name: Build documentation
        run: npm run docs:build
        env:
          DOCS_BASE: /docs/

      - name: Merge app and docs into site output
        run: |
          mkdir -p _site
          cp -r dist/. _site/
          mkdir -p _site/docs
          cp -r docs/.vitepress/dist/. _site/docs/
          touch _site/.nojekyll

      - name: Verify site output
        run: |
          echo "=== _site contents ==="
          find _site -maxdepth 2 -type f | head -30
          echo "=== _site/docs contents ==="
          find _site/docs -maxdepth 2 -type f | head -20

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
