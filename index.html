                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "The complementary DNA strand follows Watson-Crick base pairing rules: Adenine (A) pairs with Thymine (T), and Cytosine (C) pairs with Guanine (G). For example, the complement of ATGC is TACG."
                    }
                },
                {
                    "@type": "Question",
                    "name": "How do you transcribe DNA to RNA?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "During transcription, the DNA coding strand is used as a template to produce RNA. Thymine (T) is replaced by Uracil (U), so A becomes U, T becomes A, C becomes G, and G becomes C. For example, the DNA sequence ATGC transcribes to the RNA sequence UACG."
                    }
                },
                {
                    "@type": "Question",
                    "name": "How do you translate RNA to protein?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "RNA is translated to protein by reading it in groups of three nucleotides called codons. Each codon corresponds to a specific amino acid according to the standard genetic code. For example, AUG codes for Methionine (the start codon), and UAA, UAG, and UGA are stop codons."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What is a codon table?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "A codon table maps each of the 64 possible three-nucleotide RNA sequences (codons) to their corresponding amino acids. There are 20 standard amino acids and 3 stop codons. The codon table is fundamental to understanding how genetic information is translated into proteins."
                    }
                }
